<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Jazz Collective placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a2e"/>
      <stop offset="55%" stop-color="#3e5258"/>
      <stop offset="100%" stop-color="#7d9a85"/>
    </linearGradient>
    <radialGradient id="r" cx="55%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#cfe4d2" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#cfe4d2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#g)"/>
  <rect width="800" height="1000" fill="url(#r)"/>
  <!-- Upright bass silhouette, simplified -->
  <g transform="translate(400, 220)" fill="#f4ddb3" fill-opacity="0.82">
    <!-- Body (two lobes) -->
    <path d="M0,140 q-90,-30 -90,80 q0,100 90,170 q90,-70 90,-170 q0,-110 -90,-80 z"/>
    <!-- Upper bout (smaller) -->
    <path d="M0,30 q-60,-20 -60,50 q0,40 60,70 q60,-30 60,-70 q0,-70 -60,-50 z"/>
    <!-- Neck -->
    <rect x="-9" y="-180" width="18" height="200" rx="4"/>
    <!-- Scroll head -->
    <circle cx="0" cy="-200" r="22"/>
    <!-- F-holes -->
    <path d="M-30,200 q-4,40 12,55" stroke="#1f2a2e" stroke-width="3" fill="none"/>
    <path d="M30,200 q4,40 -12,55" stroke="#1f2a2e" stroke-width="3" fill="none"/>
    <!-- Strings -->
    <g stroke="#1f2a2e" stroke-width="1.2" stroke-opacity="0.7">
      <line x1="-9" y1="-160" x2="-9" y2="320"/>
      <line x1="-3" y1="-160" x2="-3" y2="320"/>
      <line x1="3"  y1="-160" x2="3"  y2="320"/>
      <line x1="9"  y1="-160" x2="9"  y2="320"/>
    </g>
  </g>
  <text x="60" y="780" font-family="Georgia, 'Times New Roman', serif" font-size="220" font-weight="500" font-style="italic" fill="#f4ddb3" fill-opacity="0.95" letter-spacing="-8">Jazz</text>
  <text x="62" y="840" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#f4ddb3" fill-opacity="0.6">COLLECTIVE</text>
</svg>
