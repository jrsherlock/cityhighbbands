<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Jazz Lab placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1b22"/>
      <stop offset="55%" stop-color="#5a2e3c"/>
      <stop offset="100%" stop-color="#9a5a55"/>
    </linearGradient>
    <radialGradient id="r" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#e0b89c" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#e0b89c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#g)"/>
  <rect width="800" height="1000" fill="url(#r)"/>
  <!-- Trumpet silhouette, simplified, oriented diagonally -->
  <g transform="translate(420, 200) rotate(20)" fill="#f4ddb3" fill-opacity="0.82">
    <!-- Bell -->
    <path d="M260,30 q40,-10 60,30 q12,28 -2,52 q-14,22 -52,18 q-32,-4 -50,-26 z"/>
    <!-- Tube -->
    <rect x="40" y="55" width="220" height="20" rx="4"/>
    <!-- Valve cluster -->
    <rect x="80" y="48" width="14" height="46" rx="3"/>
    <rect x="118" y="44" width="14" height="54" rx="3"/>
    <rect x="156" y="48" width="14" height="46" rx="3"/>
    <!-- Mouthpiece -->
    <rect x="20" y="60" width="24" height="10" rx="2"/>
    <circle cx="18" cy="65" r="8"/>
  </g>
  <!-- Two music notes -->
  <g fill="#f4ddb3" fill-opacity="0.7" transform="translate(560, 540)">
    <ellipse cx="0" cy="0" rx="22" ry="16" transform="rotate(-22)"/>
    <rect x="20" y="-78" width="6" height="80"/>
  </g>
  <g fill="#f4ddb3" fill-opacity="0.7" transform="translate(670, 600)">
    <ellipse cx="0" cy="0" rx="22" ry="16" transform="rotate(-22)"/>
    <rect x="20" y="-78" width="6" height="80"/>
  </g>
  <text x="60" y="780" font-family="Georgia, 'Times New Roman', serif" font-size="220" font-weight="500" font-style="italic" fill="#f4ddb3" fill-opacity="0.95" letter-spacing="-8">Jazz</text>
  <text x="62" y="840" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#f4ddb3" fill-opacity="0.6">LAB</text>
</svg>
